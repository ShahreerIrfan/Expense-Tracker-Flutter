name: expense_tracker
description: "Premium Expense Tracker by Muhammad Shahreer Irfan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  flutter_slidable: ^3.1.1
  reorderable_grid_view: ^2.2.8
  flutter_colorpicker: ^1.1.0
  icons_plus: ^5.0.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (Drift ORM)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Security
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  crypto: ^3.0.6

  # Services
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  speech_to_text: ^7.0.0
  flutter_local_notifications: ^18.0.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  pdf: ^3.11.2
  csv: ^6.0.0
  file_picker: ^8.1.7
  intl: any
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
